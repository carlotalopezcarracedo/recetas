name: Comprobar y publicar en GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Calcular URL pública
        shell: bash
        run: |
          repository_name="${GITHUB_REPOSITORY#*/}"
          if [[ "$repository_name" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/$repository_name" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io/$repository_name" >> "$GITHUB_ENV"
          fi
          echo "GITHUB_PAGES=true" >> "$GITHUB_ENV"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar lint
        run: npm run lint

      - name: Comprobar TypeScript
        run: npm run typecheck

      - name: Ejecutar pruebas
        run: npm test

      - name: Validar recetas
        run: npm run validate-recipes

      - name: Generar sitio estático
        run: npm run build

      - name: Desactivar procesamiento de Jekyll
        run: touch out/.nojekyll

      - name: Subir sitio estático
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
